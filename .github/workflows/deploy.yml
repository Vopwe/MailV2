name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Validate deployment secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=()

          [[ -n "${{ secrets.VPS_HOST }}" ]] || missing+=("VPS_HOST")
          [[ -n "${{ secrets.VPS_SSH_KEY }}" ]] || missing+=("VPS_SSH_KEY")

          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing required repository secrets: ${missing[*]}"
            exit 1
          fi

      - name: Deploy via SSH
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_FINGERPRINT: ${{ secrets.VPS_FINGERPRINT }}
        run: |
          set -euo pipefail

          host="$VPS_HOST"
          port="${VPS_PORT:-22}"
          user="${VPS_USER:-root}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          if [[ -n "${VPS_FINGERPRINT:-}" ]]; then
            ssh-keyscan -p "$port" -H "$host" > ~/.ssh/known_hosts.tmp
            ssh-keygen -lf ~/.ssh/known_hosts.tmp -E sha256
            if ! ssh-keygen -lf ~/.ssh/known_hosts.tmp -E sha256 | grep -Fq "$VPS_FINGERPRINT"; then
              echo "::error::Host fingerprint mismatch for $host"
              exit 1
            fi
            mv ~/.ssh/known_hosts.tmp ~/.ssh/known_hosts
          else
            ssh-keyscan -p "$port" -H "$host" >> ~/.ssh/known_hosts
          fi

          ssh \
            -i ~/.ssh/deploy_key \
            -p "$port" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            "$user@$host" \
            'bash /opt/graphenmail/deploy/update.sh'
