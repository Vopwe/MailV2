{% extends "base.html" %}
{% block title %}Server Logs — GraphenMail{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Server Logs</h1>
    <div class="header-actions">
        <button class="btn btn-secondary" onclick="refreshLogs()">Refresh</button>
        <label style="display: inline-flex; align-items: center; gap: 6px; font-size: 0.85rem;">
            <input type="checkbox" id="auto-refresh" style="width: auto;" checked> Auto-refresh
        </label>
        <select id="log-lines" style="width: auto; padding: 6px 8px; font-size: 0.85rem;">
            <option value="50">50 lines</option>
            <option value="100" selected>100 lines</option>
            <option value="200">200 lines</option>
            <option value="500">500 lines</option>
        </select>
    </div>
</div>

<div class="section">
    <div id="log-meta" class="hint" style="margin-bottom: 8px;"></div>
    <div id="log-container" style="background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; max-height: 70vh; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 0.8rem; line-height: 1.6; white-space: pre-wrap; word-break: break-all; color: var(--text-secondary);">
        Loading...
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let autoRefreshTimer = null;

async function refreshLogs() {
    const lines = document.getElementById('log-lines').value;
    const container = document.getElementById('log-container');
    const meta = document.getElementById('log-meta');

    try {
        const res = await fetch(`/api/logs?lines=${lines}`);
        const data = await res.json();

        if (data.error) {
            container.textContent = `Error: ${data.error}`;
            meta.textContent = '';
            return;
        }

        meta.textContent = `Source: ${data.file} | Showing ${data.showing} of ${data.total_lines} lines`;

        // Colorize log lines
        container.innerHTML = data.lines.map(line => {
            let cls = '';
            if (line.includes('ERROR') || line.includes('error')) cls = 'log-error';
            else if (line.includes('WARNING') || line.includes('warning')) cls = 'log-warn';
            else if (line.includes('INFO') || line.includes('Bing via IP') || line.includes('OpenRouter')) cls = 'log-info';
            return `<span class="${cls}">${escapeHtml(line)}</span>`;
        }).join('\n');

        // Auto-scroll to bottom
        container.scrollTop = container.scrollHeight;
    } catch (e) {
        container.textContent = `Failed to fetch logs: ${e.message}`;
    }
}

function escapeHtml(text) {
    const d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML;
}

function toggleAutoRefresh() {
    if (autoRefreshTimer) {
        clearInterval(autoRefreshTimer);
        autoRefreshTimer = null;
    }
    if (document.getElementById('auto-refresh').checked) {
        autoRefreshTimer = setInterval(refreshLogs, 5000);
    }
}

document.getElementById('auto-refresh').addEventListener('change', toggleAutoRefresh);
document.getElementById('log-lines').addEventListener('change', refreshLogs);

// Initial load
refreshLogs();
toggleAutoRefresh();
</script>
<style>
.log-error { color: var(--danger, #ef4444); }
.log-warn { color: var(--warning, #f59e0b); }
.log-info { color: var(--primary, #6366f1); }
</style>
{% endblock %}
